<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Masters — Grade 5 Practice Arena</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0a0a1a 0%,#1a1040 50%,#0a0a1a 100%);min-height:100vh;color:#fff}
  button{font-family:inherit}input::placeholder{color:#4a5568}
  @keyframes pulse{from{opacity:1}to{opacity:.4}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn .35s ease-out}.slide-up{animation:slideUp .4s ease-out}
  .wrap{max-width:620px;margin:0 auto;padding:24px 16px}
  .home-icon{font-size:48px;margin-bottom:8px}.home-title{font-size:32px;font-weight:800;letter-spacing:-1px}
  .home-sub{color:#a0aec0;font-size:16px;margin-top:8px}
  .home-rule{width:60px;height:3px;background:linear-gradient(90deg,#E8590C,#D69E2E);margin:16px auto;border-radius:2px}
  .cat-btn{display:flex;align-items:center;gap:16px;padding:16px 20px;width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;cursor:pointer;text-align:left;transition:all .2s;margin-bottom:10px}
  .cat-btn:hover{background:rgba(255,255,255,.08)}
  .cat-icon{font-size:28px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;flex-shrink:0}
  .cat-name{color:#fff;font-weight:700;font-size:16px}.cat-desc{color:#718096;font-size:13px;margin-top:2px}.cat-count{font-weight:700;font-size:14px;flex-shrink:0}
  .random-btn{width:100%;margin-top:20px;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,#E8590C,#D69E2E);color:#fff;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 4px 20px rgba(232,89,12,.3);transition:transform .15s}
  .random-btn:hover{transform:translateY(-1px)}
  .quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
  .exit-btn{background:none;border:none;color:#718096;font-size:14px;cursor:pointer}.exit-btn:hover{color:#a0aec0}
  .progress-label{color:#a0aec0;font-size:14px;font-weight:600}
  .score-badge{background:rgba(72,187,120,.15);color:#48bb78;padding:4px 12px;border-radius:20px;font-weight:700;font-size:14px}
  .progress-bar{display:flex;gap:3px;margin-bottom:12px}.progress-dot{flex:1;height:4px;border-radius:2px;transition:background .3s}
  .timer-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .timer-track{flex:1;height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden}
  .timer-fill{height:100%;border-radius:4px;transition:width 1s linear}
  .timer-num{font-weight:800;font-size:20px;min-width:36px;text-align:right}
  .q-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:28px 24px;margin-bottom:20px;position:relative;overflow:hidden}
  .q-accent{position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
  .q-label{color:#718096;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
  .q-text{color:#f7fafc;font-weight:600;line-height:1.5}
  .q-vis{display:flex;justify-content:center;margin:16px 0 4px;overflow-x:auto}
  .q-vis svg{max-width:100%;border-radius:8px}
  .q-tbl{margin:12px 0;border-collapse:collapse;width:100%;font-size:13px}
  .q-tbl th,.q-tbl td{border:1px solid rgba(255,255,255,.15);padding:5px 8px;text-align:center}
  .q-tbl th{background:rgba(255,255,255,.08);color:#a0aec0;font-weight:700}.q-tbl td{color:#e2e8f0}
  .choice-btn{display:flex;align-items:center;gap:14px;padding:14px 18px;width:100%;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.1);border-radius:12px;cursor:pointer;text-align:left;transition:all .2s;margin-bottom:10px}
  .choice-btn:not(.done):hover{border-color:var(--cc)}
  .choice-btn.cok{background:rgba(72,187,120,.15);border-color:#48bb78}
  .choice-btn.cbad{background:rgba(252,129,129,.15);border-color:#fc8181}
  .choice-letter{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
  .choice-text{color:#e2e8f0;font-size:16px;font-weight:500}.choice-mark{margin-left:auto;font-size:20px}
  .input-row{display:flex;gap:10px}
  .ans-input{flex:1;padding:14px 18px;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);border-radius:12px;color:#fff;font-weight:600;outline:none;font-family:inherit}
  .ans-input:focus{border-color:rgba(255,255,255,.3)}.ans-input.right{border-color:#48bb78}.ans-input.wrong{border-color:#fc8181}
  .go-btn{padding:14px 24px;border:none;border-radius:12px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;transition:opacity .2s}.go-btn:disabled{opacity:.4;cursor:default}
  .feedback{margin-top:12px;padding:12px 16px;border-radius:10px;display:flex;align-items:center;gap:10px}
  .feedback.ok{background:rgba(72,187,120,.12);border:1px solid rgba(72,187,120,.3)}
  .feedback.bad{background:rgba(252,129,129,.12);border:1px solid rgba(252,129,129,.3)}
  .fb-emoji{font-size:24px}.fb-title{font-weight:700;font-size:15px}.fb-ans{color:#a0aec0;font-size:14px;margin-top:2px}
  .next-btn{width:100%;margin-top:20px;padding:16px;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.15);border-radius:12px;color:#fff;font-weight:700;font-size:16px;cursor:pointer;transition:background .2s}
  .next-btn:hover{background:rgba(255,255,255,.1)}
  .res-emoji{font-size:64px;margin-bottom:8px}.res-title{font-size:28px;font-weight:800}
  .res-stats{display:flex;justify-content:center;gap:24px;margin-top:16px;margin-bottom:24px}
  .stat-num{font-size:36px;font-weight:800}.stat-lbl{color:#718096;font-size:13px}
  .rev-item{padding:12px 16px;margin-bottom:8px;border-radius:10px}
  .rev-item.ok{background:rgba(72,187,120,.1);border:1px solid rgba(72,187,120,.2)}
  .rev-item.bad{background:rgba(252,129,129,.1);border:1px solid rgba(252,129,129,.2)}
  .rev-q{color:#e2e8f0;font-size:14px;margin-bottom:4px}.rev-row{display:flex;gap:16px;font-size:13px;flex-wrap:wrap}
  .res-btns{display:flex;gap:12px;margin-top:20px}
  .res-btn{flex:1;padding:14px;border:none;border-radius:10px;color:#fff;font-weight:700;font-size:15px;cursor:pointer}
  .res-btn.sec{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15)}
  .scroll-box{max-height:400px;overflow-y:auto;margin-bottom:20px}
  .scroll-box::-webkit-scrollbar{width:4px}.scroll-box::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
</style>
</head>

var st={screen:"home",cat:null,qs:[],idx:0,ans:"",done:false,ok:null,score:0,total:0,time:0,to:false,res:[],tmr:null};
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function norm(s){return String(s).trim().toLowerCase().replace(/[\$%,\s]/g,"");}
function startCat(k){clearInterval(st.tmr);var qs=shuffle(Q.filter(function(q){return q.c===k;}));var c=CATEGORIES[k];st={screen:"quiz",cat:k,qs:qs,idx:0,ans:"",done:false,ok:null,score:0,total:qs.length,time:c.timer,to:false,res:[],tmr:null};startT();render();}
function startRandom(){clearInterval(st.tmr);var qs=shuffle(Q).slice(0,20);st={screen:"quiz",cat:qs[0].c,qs:qs,idx:0,ans:"",done:false,ok:null,score:0,total:20,time:30,to:false,res:[],tmr:null};startT();render();}
function startT(){clearInterval(st.tmr);if(st.qs[st.idx].t==="m")return;st.tmr=setInterval(function(){st.time--;if(st.time<=0){clearInterval(st.tmr);st.to=true;st.done=true;st.ok=false;st.res.push({q:st.qs[st.idx].q,y:"Time\u2019s up!",c:st.qs[st.idx].a,ok:false});render();}else{updT();}},1000);}
function chk(u){if(st.done)return;clearInterval(st.tmr);var q=st.qs[st.idx];var ok=norm(u)===norm(q.a);st.done=true;st.ok=ok;st.ans=u;if(ok)st.score++;st.res.push({q:q.q,y:u,c:q.a,ok:ok});render();}
function nxt(){if(st.idx+1>=st.qs.length){st.screen="results";render();return;}st.idx++;st.done=false;st.ok=null;st.ans="";st.to=false;var q=st.qs[st.idx];st.cat=q.c;st.time=CATEGORIES[q.c].timer;startT();render();}
function updT(){var c=CATEGORIES[st.cat];var f=document.getElementById("tf");var n=document.getElementById("tn");if(!f||!n)return;var p=(st.time/c.timer)*100;var u=st.time<=3;f.style.width=p+"%";f.style.background=u?"#ef4444":c.color;f.style.boxShadow=u?"0 0 12px #ef4444":"none";n.textContent=st.time;n.style.color=u?"#ef4444":"#a0aec0";n.style.animation=u?"pulse .5s infinite alternate":"none";}

function render(){var a=document.getElementById("app");if(st.screen==="home")a.innerHTML=rHome();else if(st.screen==="quiz")a.innerHTML=rQuiz();else a.innerHTML=rRes();bind();}

function rHome(){var cs="";for(var k in CATEGORIES){var c=CATEGORIES[k];var n=Q.filter(function(q){return q.c===k;}).length;cs+='<button class="cat-btn" data-cat="'+k+'"><div class="cat-icon" style="background:'+c.color+'22">'+c.icon+'</div><div style="flex:1"><div class="cat-name">'+c.name+'</div><div class="cat-desc">'+c.desc+'</div></div><div class="cat-count" style="color:'+c.color+'">'+n+'Q</div></button>';}
return '<div style="text-align:center;margin-bottom:32px" class="fade-in"><div class="home-icon">\uD83E\uDDEE</div><h1 class="home-title">Math Masters</h1><p class="home-sub">Grade 5 Practice Arena</p><div class="home-rule"></div></div><div class="slide-up">'+cs+'</div><button class="random-btn" id="rb">\uD83C\uDFB2 Random Mix (20 Questions)</button>';}

function rQuiz(){var q=st.qs[st.idx];var c=CATEGORIES[st.cat];var isM=q.t==="m";var isF=q.c==="FACT_DRILL";
var dots="";for(var i=0;i<st.qs.length;i++){var bg="rgba(255,255,255,.08)";if(i<st.idx)bg=st.res[i]&&st.res[i].ok?"#48bb78":"#fc8181";else if(i===st.idx)bg=c.color;dots+='<div class="progress-dot" style="background:'+bg+'"></div>';}
var tmr="";if(!isM&&!st.done){var p=(st.time/c.timer)*100;var u=st.time<=3;tmr='<div class="timer-row"><div class="timer-track"><div class="timer-fill" id="tf" style="width:'+p+'%;background:'+(u?"#ef4444":c.color)+'"></div></div><div class="timer-num" id="tn" style="color:'+(u?"#ef4444":"#a0aec0")+'">'+ st.time+'</div></div>';}
var vis="";if(q.v)vis='<div class="q-vis">'+q.v+'</div>';if(q.h)vis+='<div style="overflow-x:auto;margin:12px 0">'+q.h+'</div>';
var ans="";
if(isM){for(var i=0;i<q.o.length;i++){var lb=q.l[i];var co=st.done&&lb===q.a;var sl=st.done&&st.ans===lb;var cl="choice-btn";if(st.done){cl+=" done";if(co)cl+=" cok";if(sl&&!st.ok)cl+=" cbad";}var bg2=co&&st.done?"#48bb78":c.color+"33";var fg=co&&st.done?"#fff":c.color;var mk="";if(st.done&&co)mk='<span class="choice-mark">\u2713</span>';if(st.done&&sl&&!st.ok)mk='<span class="choice-mark" style="color:#fc8181">\u2717</span>';ans+='<button class="'+cl+'" data-ch="'+lb+'" style="--cc:'+c.color+'"><div class="choice-letter" style="background:'+bg2+';color:'+fg+'">'+lb+'</div><span class="choice-text">'+q.o[i]+'</span>'+mk+'</button>';}}
else{var ic=st.done?(st.ok?"ans-input right":"ans-input wrong"):"ans-input";ans='<div class="input-row"><input class="'+ic+'" id="ai" type="text" value="'+st.ans.replace(/"/g,"&quot;")+'" placeholder="'+(isF?"Type answer...":"Your answer...")+'" style="font-size:'+(isF?24:18)+'px" '+(st.done?"disabled":"")+" autocomplete=\"off\">"+(st.done?"":'<button class="go-btn" id="gb" style="background:'+c.color+'" '+(st.ans.trim()?"":"disabled")+">Go</button>")+"</div>";if(st.done){ans+='<div class="feedback '+(st.ok?"ok":"bad")+'"><span class="fb-emoji">'+(st.ok?"\u2705":st.to?"\u23F0":"\u274C")+'</span><div><div class="fb-title" style="color:'+(st.ok?"#48bb78":"#fc8181")+'">'+(st.ok?"Correct!":st.to?"Time\u2019s up!":"Not quite!")+"</div>"+(st.ok?"":"<div class=\"fb-ans\">Answer: <strong style=\"color:#48bb78\">"+q.a+"</strong></div>")+"</div></div>";}}
var nb="";if(st.done)nb='<button class="next-btn" id="nb">'+(st.idx+1>=st.qs.length?"See Results \u2192":"Next Question \u2192")+"</button>";
return '<div class="fade-in"><div class="quiz-header"><button class="exit-btn" id="eb">\u2190 Exit</button><div class="progress-label">'+c.icon+" "+(st.idx+1)+" / "+st.qs.length+'</div><div class="score-badge">'+st.score+' \u2713</div></div><div class="progress-bar">'+dots+"</div>"+tmr+'<div class="q-card"><div class="q-accent" style="background:'+c.color+'"></div><div class="q-label">'+c.name+'</div><div class="q-text" style="font-size:'+(isF?28:18)+'px">'+q.q+"</div>"+vis+"</div>"+ans+nb+"</div>";}

function rRes(){var p=Math.round((st.score/st.total)*100);var em=p>=90?"\uD83C\uDFC6":p>=70?"\uD83C\uDF1F":p>=50?"\uD83D\uDCAA":"\uD83D\uDCDA";var c=CATEGORIES[st.cat];
var its="";for(var i=0;i<st.res.length;i++){var r=st.res[i];its+='<div class="rev-item '+(r.ok?"ok":"bad")+'"><div class="rev-q">'+r.q+'</div><div class="rev-row"><span style="color:'+(r.ok?"#48bb78":"#fc8181")+'">Your answer: <strong>'+r.y+"</strong></span>"+(r.ok?"":"<span style=\"color:#48bb78\">Correct: <strong>"+r.c+"</strong></span>")+"</div></div>";}
return '<div class="fade-in" style="text-align:center"><div class="res-emoji">'+em+'</div><h2 class="res-title">Round Complete!</h2><div class="res-stats"><div><div class="stat-num" style="color:#48bb78">'+st.score+'</div><div class="stat-lbl">Correct</div></div><div><div class="stat-num" style="color:#fc8181">'+(st.total-st.score)+'</div><div class="stat-lbl">Missed</div></div><div><div class="stat-num" style="color:#D69E2E">'+p+'%</div><div class="stat-lbl">Score</div></div></div></div><div class="scroll-box">'+its+'</div><div class="res-btns"><button class="res-btn" id="rr" style="background:'+(c?c.color:"#E8590C")+'">Try Again</button><button class="res-btn sec" id="rh">Back to Menu</button></div>';}
